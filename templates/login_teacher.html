{% extends "base.html" %}
{% block title %}Teacher Login{% endblock %}
{% block body %}
<div class="auth-wrap">
  <div class="auth-card">
    <div style="text-align:center;font-size:40px;margin-bottom:8px">👨‍🏫</div>
    <h2 style="text-align:center;margin-bottom:4px">Teacher Login</h2>
    <p class="auth-sub">Enter your teacher credentials</p>
    <form method="POST" action="/login/teacher">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Teacher username" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Password" required>
      </div>
      <button class="btn btn-primary btn-round" style="width:100%;margin-top:8px" type="submit">
        Log In as Teacher
      </button>
    </form>
    <div class="auth-footer" style="margin-top:16px">
      <a href="/login" style="color:var(--purple2)">← Back to role selection</a>
    </div>
    <div class="auth-footer">New teacher? <a href="/signup/teacher">Create account</a></div>
  </div>
</div>
{% endblock %}
