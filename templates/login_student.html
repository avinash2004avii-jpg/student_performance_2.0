{% extends "base.html" %}
{% block title %}Student Login{% endblock %}
{% block body %}
<div class="auth-wrap">
  <div class="auth-card">
    <div style="text-align:center;font-size:40px;margin-bottom:8px">🎓</div>
    <h2 style="text-align:center;margin-bottom:4px">Student Login</h2>
    <p class="auth-sub">Enter your student credentials</p>
    <form method="POST" action="/login/student">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Student username" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Password" required>
      </div>
      <button class="btn btn-primary btn-round" style="width:100%;margin-top:8px" type="submit">
        Log In as Student
      </button>
    </form>
    <div class="auth-footer" style="margin-top:16px">
      <a href="/login" style="color:var(--purple2)">← Back to role selection</a>
    </div>
    <div class="auth-footer">New student? <a href="/signup/student">Create account</a></div>
  </div>
</div>
{% endblock %}
