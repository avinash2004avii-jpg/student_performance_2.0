<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Student Performance System{% endblock %}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0016;--surface:#140024;--surface2:#1f0035;
  --purple:#7b2cff;--purple2:#a64cff;--purple-light:#e6d3ff;
  --green:#00e676;--red:#ff4d94;--amber:#ffaa00;
  --text:#ffffff;--muted:#bbb;--border:rgba(138,43,226,.35);
}
body.light-mode {
  --bg: #f8fafc;
  --surface: #ffffff;
  --surface2: #f1f5f9;
  --purple-light: #7c3aed;
  --text: #1e293b;
  --muted: #64748b;
  --border: #cbd5e1;
}
/* Light mode specific elements */
body.light-mode th {
  background: #f1f5f9;
  color: #7c3aed;
}
body.light-mode tr:hover {
  background: #f8fafc;
}
body.light-mode td, body.light-mode th {
  border-bottom: 1px solid #cbd5e1;
}
body.light-mode .form-group input, body.light-mode .form-group select, body.light-mode .form-group textarea, body.light-mode .search-input {
  background: #ffffff;
  color: #1e293b;
  border: 1px solid #cbd5e1;
}
body.light-mode .form-group input:focus, body.light-mode .form-group select:focus, body.light-mode .search-input:focus {
  border-color: #7c3aed;
}
body.light-mode .topbar {
  background: linear-gradient(90deg, #7c3aed, #9333ea);
  box-shadow: 0 2px 12px rgba(124, 58, 237, 0.2);
}
body.light-mode .sidebar {
  background: #ffffff;
  box-shadow: 2px 0 10px rgba(0,0,0,0.05);
}
body.light-mode .sidebar-logo {
  color: #1e293b;
}
body.light-mode .sidebar a {
  color: #64748b;
}
body.light-mode .sidebar a:hover, body.light-mode .sidebar a.active {
  background: rgba(124, 58, 237, 0.1);
  color: #7c3aed;
}
body.light-mode .hero, body.light-mode .role-wrap {
  background: radial-gradient(ellipse at top, #e2e8f0 0%, #f8fafc 100%) !important;
}
body.light-mode .hcard, body.light-mode .role-card, body.light-mode .auth-card {
  background: #ffffff;
  border: 1px solid #cbd5e1;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
}
body.light-mode .hcard h3, body.light-mode .role-card h3, body.light-mode .auth-card h2 {
  color: #1e293b;
}
body.light-mode .hcard p, body.light-mode .role-card p, body.light-mode .auth-sub, body.light-mode .auth-footer {
  color: #64748b;
}
body.light-mode .hero h1, body.light-mode .role-wrap h1 {
  background: linear-gradient(90deg, #1e293b, #7c3aed);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
body.light-mode .theme-toggle {
  background: rgba(0, 0, 0, 0.05);
  border: 1px solid rgba(0, 0, 0, 0.1);
  color: #1e293b;
}
.theme-toggle {
  background: rgba(255, 255, 255, 0.1);
  padding: 8px 16px;
  border-radius: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 600;
  border: 1px solid rgba(255, 255, 255, 0.1);
  cursor: pointer;
  backdrop-filter: blur(5px);
  color: var(--text);
  transition: all 0.3s;
}
.theme-toggle .dot {
  width: 12px;
  height: 12px;
  background: #ffaa00;
  border-radius: 50%;
  box-shadow: 0 0 10px #ffaa00;
  transition: all 0.3s;
}
body{font-family:Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{text-decoration:none;color:inherit}

/* Flash messages - Premium Toast Design */
.flash-wrap{position:fixed;top:25px;right:25px;z-index:10000;display:flex;flex-direction:column;gap:12px;max-width:400px}
.flash{padding:16px 24px;border-radius:12px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:12px;box-shadow:0 10px 30px rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(10px);animation:toastIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)}
@keyframes toastIn{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}
.flash.success{background:rgba(16, 185, 129, 0.9);border-left:5px solid #00e676;color:white}
.flash.danger {background:rgba(239, 68, 68, 0.9);border-left:5px solid #ff4d94;color:white}
.flash.warning{background:rgba(245, 158, 11, 0.9);border-left:5px solid #ffaa00;color:white}
.flash::before { font-size: 18px; }
.flash.success::before { content: "✅"; }
.flash.danger::before { content: "❌"; }
.flash.warning::before { content: "⚠️"; }

/* Topbar */
.topbar{background:linear-gradient(90deg,#4b0082,#8a2be2);padding:14px 28px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 12px rgba(138,43,226,.5)}
.topbar-brand{font-size:18px;font-weight:bold}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-user{font-size:13px;color:var(--purple-light)}

/* Sidebar layout */
.layout{display:flex}
.sidebar{width:210px;min-height:calc(100vh - 54px);background:linear-gradient(180deg,#140024,#0a0016);position:sticky;top:0;height:calc(100vh - 54px);overflow-y:auto;overflow-x:hidden;box-shadow:2px 0 10px rgba(138,43,226,.25);flex-shrink:0}
.sidebar-logo{text-align:center;padding:25px 16px 15px;font-weight:bold;font-size:18px;color:var(--purple-light);letter-spacing:1px;text-transform:uppercase}
.sidebar a{display:flex;align-items:center;gap:12px;padding:14px 22px;color:#caa9ff;font-size:14px;transition:.2s;border-left:4px solid transparent;margin-bottom:2px}
.sidebar a:hover,.sidebar a.active{background:linear-gradient(90deg,rgba(123,44,255,0.25),transparent);color:white;border-left-color:var(--purple2)}
.sidebar .divider{height:1px;background:var(--border);margin:15px 20px}
.page{flex:1;overflow-x:hidden}

/* Content */
.container{padding:28px 32px;max-width:1200px}
h1{font-size:24px;margin-bottom:6px}
h2{font-size:19px;margin-bottom:12px}
h3{font-size:15px;margin-bottom:10px}
.page-sub{color:var(--muted);font-size:13px;margin-bottom:24px}

/* Cards grid */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:28px}
.stat-card{background:linear-gradient(135deg,var(--purple),var(--purple2));padding:20px 16px;border-radius:15px;text-align:center;box-shadow:0 8px 20px -5px rgba(0,0,0,0.3);position:relative;overflow:hidden;transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);display:flex;flex-direction:column;justify-content:center;min-height:120px;border:1px solid rgba(255,255,255,0.05)}
.stat-card:hover{transform:translateY(-4px);box-shadow:0 15px 30px -10px rgba(123, 44, 255, 0.4);border-color:rgba(255,255,255,0.15)}
.stat-card .label{font-size:12px;font-weight:600;opacity:0.9;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px}
.stat-card .value{font-size:32px;font-weight:800;line-height:1}

/* Section box */
.section{background:var(--surface);border-radius:12px;padding:24px;box-shadow:0 0 12px var(--border);margin-bottom:24px}

/* Table */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:600px}
th,td{padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.07);text-align:left;font-size:13px}
th{background:#2a0050;color:var(--purple-light);font-size:12px;text-transform:uppercase;letter-spacing:.5px;font-weight:500}
tr:hover{background:var(--surface2)}

/* Badges */
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:bold}
.badge-risk{background:rgba(255,0,110,.15);color:var(--red);border:1px solid #ff006e}
.badge-avg {background:rgba(255,170,0,.15);color:var(--amber);border:1px solid var(--amber)}
.badge-safe{background:rgba(0,230,118,.15);color:var(--green);border:1px solid var(--green)}

/* Buttons */
.btn{display:inline-block;padding:10px 22px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;font-size:14px;transition:.2s}
.btn:hover{opacity:.88;transform:translateY(-1px)}
.btn-primary{background:linear-gradient(90deg,var(--purple),var(--purple2));color:white}
.btn-success{background:#1f9d55;color:white}
.btn-danger {background:#c0392b;color:white}
.btn-outline{background:transparent;border:1px solid var(--purple2);color:var(--purple-light)}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:6px}
.btn-round{border-radius:25px}

/* Forms */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;color:var(--muted);margin-bottom:5px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;outline:none;transition:.2s}
.form-group input:focus,.form-group select:focus{border-color:var(--purple2);box-shadow:0 0 0 2px rgba(123,44,255,.25)}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.form-section-title{font-size:12px;font-weight:bold;color:var(--purple2);text-transform:uppercase;letter-spacing:1px;margin:20px 0 10px;border-bottom:1px solid var(--border);padding-bottom:6px}

/* Auth pages */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-card{background:var(--surface);padding:40px;border-radius:16px;box-shadow:0 0 30px rgba(138,43,226,.45);width:100%;max-width:440px}
.auth-card h2{text-align:center;margin-bottom:6px}
.auth-sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:28px}
.auth-footer{text-align:center;margin-top:20px;font-size:13px;color:var(--muted)}
.auth-footer a{color:var(--purple2)}

/* Search bar */
.search-bar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.search-input{padding:9px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;outline:none;width:240px}
.search-input:focus{border-color:var(--purple2)}

/* Insight box */
.insight{background:var(--surface);border-left:4px solid var(--purple);padding:14px 18px;border-radius:0 8px 8px 0;font-size:13px;color:#ddd;margin-bottom:24px;line-height:1.7}

/* Tip cards */
.tip{background:var(--surface2);border-radius:10px;padding:16px 18px;margin-bottom:12px;border-left:3px solid var(--purple2)}
.tip-title{font-weight:bold;font-size:14px;margin-bottom:4px;color:var(--purple-light)}
.tip-body{font-size:13px;color:var(--muted);line-height:1.6}

/* Score circle */
.score-circle{width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:bold;border:5px solid;margin:0 auto 16px}
.circle-risk{border-color:var(--red);color:var(--red);background:rgba(255,0,110,.08)}
.circle-avg {border-color:var(--amber);color:var(--amber);background:rgba(255,170,0,.08)}
.circle-safe{border-color:var(--green);color:var(--green);background:rgba(0,230,118,.08)}

/* Error / empty */
.empty{text-align:center;padding:40px;color:var(--muted);font-size:14px}
/* Custom Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(138, 43, 226, 0.3); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: rgba(138, 43, 226, 0.5); }
* { scrollbar-width: thin; scrollbar-color: rgba(138, 43, 226, 0.3) transparent; }
</style>
{% block head %}{% endblock %}
</head>
<body>
<script>
  (function() {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'light') {
      document.body.classList.add('light-mode');
    }
  })();
</script>

<div class="flash-wrap">
  {% for cat, msg in get_flashed_messages(with_categories=true) %}
  <div class="flash {{ cat }}">{{ msg | safe }}</div>
  {% endfor %}
</div>

{% block body %}{% endblock %}

<script>
function toggleMode() {
  document.body.classList.toggle('light-mode');
  const isLight = document.body.classList.contains('light-mode');
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
  updateThemeUI(isLight);
}

function updateThemeUI(isLight) {
  const themeTextEls = document.querySelectorAll('.theme-toggle span:not(.dot)');
  themeTextEls.forEach(el => {
    if (el) el.textContent = isLight ? 'Dark' : 'Light';
  });
  const themeDots = document.querySelectorAll('.theme-toggle .dot, .theme-toggle .sun-icon');
  themeDots.forEach(dot => {
    if (dot) {
      if (isLight) {
        dot.style.background = '#7b2cff';
        dot.style.boxShadow = '0 0 10px #7b2cff';
      } else {
        dot.style.background = '#ffaa00';
        dot.style.boxShadow = '0 0 10px #ffaa00';
      }
    }
  });
}

window.addEventListener('DOMContentLoaded', () => {
  const existingToggle = document.querySelector('.theme-toggle');
  if (!existingToggle) {
    const topbarRight = document.querySelector('.topbar-right');
    if (topbarRight) {
      const toggleDiv = document.createElement('div');
      toggleDiv.className = 'theme-toggle';
      toggleDiv.onclick = toggleMode;
      toggleDiv.style.cssText = 'padding:6px 15px; margin-right:12px;';
      
      const dotDiv = document.createElement('div');
      dotDiv.className = 'dot';
      
      const spanText = document.createElement('span');
      spanText.textContent = 'Light';
      
      toggleDiv.appendChild(dotDiv);
      toggleDiv.appendChild(spanText);
      
      topbarRight.insertBefore(toggleDiv, topbarRight.firstChild);
    } else {
      const toggleDiv = document.createElement('div');
      toggleDiv.className = 'theme-toggle';
      toggleDiv.onclick = toggleMode;
      toggleDiv.style.cssText = 'position:fixed; bottom:24px; right:24px; z-index:9999;';
      
      const dotDiv = document.createElement('div');
      dotDiv.className = 'dot';
      
      const spanText = document.createElement('span');
      spanText.textContent = 'Light';
      
      toggleDiv.appendChild(dotDiv);
      toggleDiv.appendChild(spanText);
      
      document.body.appendChild(toggleDiv);
    }
  }
  
  const isLight = document.body.classList.contains('light-mode');
  updateThemeUI(isLight);
});

// Auto-dismiss flash messages after 4 s
setTimeout(() => {
  document.querySelectorAll('.flash').forEach(el => {
    el.style.transition = 'opacity .4s';
    el.style.opacity = '0';
    setTimeout(() => el.remove(), 400);
  });
}, 4000);
</script>
</body>
</html>
